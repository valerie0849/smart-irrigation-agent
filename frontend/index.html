<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧灌溉方案生成系统</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="/lib/react.min.js"></script>
<script src="/lib/react-dom.min.js"></script>
<script src="/lib/axios.min.js"></script>
<script src="/lib/marked.min.js"></script>
<style>
:root {
  --bg:#fff;--bg2:#f8f9fa;--border:#e8eaed;--text:#1a1a1a;--text2:#5f6368;--text3:#9aa0a6;
  --accent:#1a73e8;--accent-hover:#1557b0;--green:#0d904f;--green-bg:#e6f4ea;--red:#d93025;--red-bg:#fce8e6;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.1);
  --diff-add:#e6f4ea;--diff-add-text:#0d904f;--diff-remove:#fce8e6;--diff-remove-text:#d93025;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
#root{height:100%;display:flex;flex-direction:column}

header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--bg);z-index:10;flex-shrink:0}
header h1{font-size:16px;font-weight:600;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
header h1 span{font-weight:400;color:var(--text2);font-size:13px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-on{background:var(--green-bg);color:var(--green)}
.badge-off{background:var(--red-bg);color:var(--red)}
.badge-api{background:#e8f0fe;color:var(--accent)}

.layout{display:flex;flex:1;overflow:hidden}

.sidebar{width:240px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.new-chat{width:100%;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px}
.new-chat:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.session-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text2);margin-bottom:2px;transition:all .15s;display:flex;align-items:center;gap:8px;word-break:break-all}
.session-item:hover{background:#e8eaed}
.session-item.active{background:#e8f0fe;color:var(--accent);font-weight:500}
.session-item svg{flex-shrink:0;opacity:.4}
.del-session{margin-left:auto;opacity:0;transition:opacity .15s;background:none;border:none;cursor:pointer;color:var(--text3);padding:2px;border-radius:4px}
.session-item:hover .del-session{opacity:1}
.del-session:hover{color:var(--red);background:var(--red-bg)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;min-height:0}
.main-content{flex:1;display:flex;overflow:hidden;min-width:0;min-height:0}
.chat-area{flex:1;overflow-y:auto;padding:24px;scroll-behavior:smooth;min-height:0}
.chat-area.with-editor{flex:0 0 50%;border-right:1px solid var(--border)}
.editor-panel{flex:0 0 50%;display:flex;flex-direction:column;overflow:hidden}
.editor-panel .editor-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg)}
.editor-panel .plan-editor{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0}
.editor-panel .plan-editor textarea{border-radius:0;border:none;border-bottom:1px solid var(--border);flex:1;min-height:0}
.editor-panel .editor-toolbar{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--bg)}

.diff-line{padding:2px 8px;font-size:12px;line-height:1.5}
.diff-remove-line{background:var(--diff-remove);color:var(--diff-remove-text)}
.diff-add-line{background:var(--diff-add);color:var(--diff-add-text)}
.diff-same-line{color:var(--text2)}

.msg{max-width:800px;margin:0 auto 20px;animation:fadeIn .3s ease}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .bubble{background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 4px var(--radius);padding:12px 16px;font-size:14px;max-width:70%;line-height:1.6}
.msg-assistant .bubble{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 4px;padding:16px 20px;font-size:14px;line-height:1.8}
.msg-assistant .bubble h1,.msg-assistant .bubble h2,.msg-assistant .bubble h3{margin:16px 0 8px;color:var(--text);font-weight:600}
.msg-assistant .bubble h1{font-size:20px;border-bottom:1px solid var(--border);padding-bottom:8px}
.msg-assistant .bubble h2{font-size:16px}
.msg-assistant .bubble h3{font-size:14px}
.msg-assistant .bubble table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}
.msg-assistant .bubble th,.msg-assistant .bubble td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg-assistant .bubble th{background:var(--bg2);font-weight:500;color:var(--text2)}
.msg-assistant .bubble blockquote{border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--text2)}
.msg-assistant .bubble code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:12px}
.msg-assistant .bubble pre{background:#1a1a1a;color:#e8eaed;padding:16px;border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;line-height:1.5}
.msg-assistant .bubble ul,.msg-assistant .bubble ol{padding-left:24px;margin:8px 0}
.msg-assistant .bubble li{margin:4px 0}
.msg-assistant .bubble hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.msg-assistant .bubble strong{font-weight:600}
.msg-assistant .bubble a{color:var(--accent)}

.progress-container{margin:16px 0}
.progress-steps{list-style:none;padding:0;margin:0}
.progress-steps li{padding:8px 12px;margin:4px 0;font-size:13px;color:var(--text2);background:var(--bg2);border-radius:var(--radius-sm);border-left:3px solid var(--border);transition:all .3s}
.progress-steps li.active{border-left-color:var(--accent);color:var(--text);background:#e8f0fe;animation:pulse 1.5s infinite}
.progress-steps li.done{border-left-color:var(--green);color:var(--text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.plan-editor{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:8px 0}
.plan-editor h2{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--accent)}
.plan-editor .plan-meta{font-size:13px;color:var(--text2);margin-bottom:16px}
.plan-editor textarea{width:100%;min-height:300px;max-height:400px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-size:14px;font-family:inherit;line-height:1.8;resize:vertical;outline:none;overflow-y:auto}
.plan-editor textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.plan-editor .editor-toolbar{display:flex;gap:8px;margin-top:12px}
.plan-editor .editor-toolbar button{padding:6px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.plan-editor .btn-save{background:var(--accent);color:#fff;border:none}
.plan-editor .btn-save:hover{background:var(--accent-hover)}
.plan-editor .btn-undo{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.plan-editor .btn-undo:hover{border-color:var(--accent);color:var(--accent)}
.plan-editor .btn-export{background:var(--bg);color:var(--text2);border:1px solid var(--border);position:relative}
.plan-editor .btn-export:hover{border-color:var(--accent);color:var(--accent)}
.plan-editor .export-drop{position:absolute;top:100%;right:0;margin-top:4px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 4px 12px rgba(0,0,0,.12);min-width:130px;z-index:20;display:none}
.plan-editor .export-drop.open{display:block}
.plan-editor .export-drop button{display:block;width:100%;text-align:left;border:none;border-radius:0;padding:8px 14px;font-size:13px;color:var(--text2);background:var(--bg);cursor:pointer}
.plan-editor .export-drop button:first-child{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
.plan-editor .export-drop button:last-child{border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.plan-editor .export-drop button:hover{background:var(--bg2)}

.quality-report{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px 0}
.quality-report h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--accent);display:flex;align-items:center;gap:8px}
.quality-score{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.quality-score .score-circle{width:80px;height:80px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
.quality-score .score-circle.excellent{background:#e6f4ea;color:#0d904f;border:2px solid #0d904f}
.quality-score .score-circle.good{background:#e8f0fe;color:#1a73e8;border:2px solid #1a73e8}
.quality-score .score-circle.pass{background:#fff3cd;color:#d97706;border:2px solid #d97706}
.quality-score .score-circle.improve{background:#fce8e6;color:#d93025;border:2px solid #d93025}
.quality-score .score-circle .grade{font-size:14px;font-weight:500;margin-top:2px}
.quality-score .score-details{flex:1}
.quality-score .score-details .detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.quality-score .score-details .detail-row:last-child{border-bottom:none}
.quality-score .score-details .detail-label{color:var(--text2);font-size:13px}
.quality-score .score-details .detail-value{font-weight:600}
.quality-section{margin-top:16px}
.quality-section h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px}
.quality-section ul{margin:0;padding-left:20px}
.quality-section li{font-size:13px;color:var(--text2);margin:4px 0;line-height:1.6}
.quality-section li::marker{color:var(--accent)}

.data-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:8px 0}.data-card h3{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}.data-card.weather-card h3{color:#1a73e8}.data-card.soil-card h3{color:#0d904f}.data-card table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px}.data-card th,.data-card td{border:1px solid var(--border);padding:8px 12px;text-align:left}.data-card th{background:var(--bg2);font-weight:500;color:var(--text2)}.data-card .data-source{font-size:12px;color:var(--text3);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)}

.diff-viewer{display:flex;gap:12px;margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.diff-panel{flex:1;min-width:0}
.diff-panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.diff-panel-header span{font-size:12px;font-weight:500;color:var(--text2)}
.diff-panel-header .diff-toggle{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline}
.diff-panel-content{padding:12px;max-height:400px;overflow-y:auto}
.diff-line{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-all;padding:2px 0}
.diff-line.add{background:var(--diff-add);color:var(--diff-add-text)}
.diff-line.remove{background:var(--diff-remove);color:var(--diff-remove-text)}
.diff-line.same{color:var(--text3)}
.diff-line.add::before{content:'+ '}
.diff-line.remove::before{content:'- '}
.diff-line.same::before{content:'  '}

.knowledge-refs-toggle{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.knowledge-refs-toggle:hover{border-color:var(--accent);color:var(--accent);background:#f0f6ff}
.knowledge-refs-toggle .badge{background:var(--accent);color:#fff;font-size:11px;padding:1px 6px;border-radius:10px;font-weight:500}
.knowledge-refs{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-top:12px;overflow:hidden;max-height:400px;overflow-y:auto}
.knowledge-refs h4{font-size:14px;font-weight:600;color:var(--text);padding:12px 16px;margin:0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.knowledge-refs h4::before{content:'📚'}
.knowledge-refs-list{list-style:none;padding:8px;margin:0}
.knowledge-refs-list li{padding:8px 12px;margin:4px 0;border-radius:var(--radius-sm);background:var(--bg);border-left:3px solid var(--accent);font-size:13px;line-height:1.6}
.knowledge-refs-list li .ref-source{font-weight:600;color:var(--accent);margin-bottom:4px}
.knowledge-refs-list li .ref-content{color:var(--text2);max-height:60px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.knowledge-refs-list li .ref-tag{display:inline-block;padding:1px 6px;border-radius:10px;font-size:11px;margin-left:8px;font-weight:500}
.knowledge-refs-list li .ref-tag.template{background:#e8f0fe;color:#1a73e8}
.knowledge-refs-list li .ref-tag.standard{background:#fce8e6;color:#d93025}
.knowledge-refs-list li .ref-tag.domain_knowledge{background:#e6f4ea;color:#0d904f}

.local-undo-btn{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:2px 6px;border-radius:4px;opacity:0;transition:opacity .15s}
.local-undo-btn:hover{background:var(--green-bg)}
.diff-line:hover .local-undo-btn{opacity:1}

.greeting{text-align:center;padding:40px 20px}
.greeting h2{font-size:22px;font-weight:600;margin-bottom:12px;letter-spacing:-0.4px}
.greeting p{color:var(--text2);font-size:14px;max-width:400px;margin:0 auto 24px;line-height:1.8}
.greeting .hints{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:600px;margin:0 auto}
.greeting .hint{padding:8px 14px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);cursor:pointer;background:var(--bg);transition:all .15s}
.greeting .hint:hover{border-color:var(--accent);color:var(--accent);background:#f0f6ff}

.typing{display:flex;align-items:center;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:typing 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.input-area{border-top:1px solid var(--border);padding:16px 24px;background:var(--bg);flex-shrink:0}
.input-wrap{max-width:800px;margin:0 auto;display:flex;gap:8px}
.input-wrap textarea{flex:1;border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.5;min-height:44px;max-height:120px;transition:border-color .15s}
.input-wrap textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
.input-wrap button.send-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:0 20px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap}
.input-wrap button.send-btn:hover{background:var(--accent-hover)}
.input-wrap button.send-btn:disabled{opacity:.5;cursor:not-allowed}

.editor-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.editor-modal{background:var(--bg);border-radius:var(--radius);padding:24px;width:90%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.editor-overlay .plan-editor{flex:1;display:flex;flex-direction:column;min-height:0}
.editor-overlay .plan-editor textarea{min-height:200px;flex:1}

.plan-bubble{max-height:600px;overflow-y:auto;position:relative}
.plan-bubble .plan-content{max-height:400px;overflow-y:auto}

@media(max-width:768px){
  .sidebar{display:none}
  .msg-user .bubble{max-width:85%}
}

.chat-area::-webkit-scrollbar{width:6px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.chat-area::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.addEventListener('DOMContentLoaded', function() {
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
    document.getElementById('root').innerHTML = '<div style="padding:40px;text-align:center;font-family:sans-serif;"><h2>资源加载失败</h2><p>请检查网络连接后刷新页面</p><button onclick="location.reload()" style="padding:10px 20px;margin-top:16px;cursor:pointer;">刷新</button></div>';
    return;
  }

var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;
var useCallback = React.useCallback;
var AXIOS = axios.create({baseURL:''});

var DEFAULT_GREETING = '你好！我是智慧灌溉助手 v3。\n\n你可以：\n\n1. 描述项目，如"河南中牟县2000亩小麦，预算200万"，我来生成方案\n\n2. 查询气象/土壤数据\n\n3. 查询知识库\n\n4. 对已有方案提出修改';

function App() {
  var _a = useState([{role:'assistant',content:DEFAULT_GREETING}]), msgs = _a[0], setMsgs = _a[1];

  var _c = useState(false), loading = _c[0], setLoading = _c[1];
  var _d = useState(''), sid = _d[0], setSid = _d[1];

  var _f = useState(null), planData = _f[0], setPlanData = _f[1];
  var _g = useState(''), editedPlan = _g[0], setEditedPlan = _g[1];
  var _h = useState(''), originalPlan = _h[0], setOriginalPlan = _h[1];
  var _i = useState(false), exportOpen = _i[0], setExportOpen = _i[1];
  var _j = useState(''), llmMode = _j[0], setLlmMode = _j[1];
  var _k = useState(null), qualityData = _k[0], setQualityData = _k[1];
  var _kr = useState([]), knowledgeRefs = _kr[0], setKnowledgeRefs = _kr[1];
  var _krt = useState(false), knowledgeRefsOpen = _krt[0], setKnowledgeRefsOpen = _krt[1];
  var _ko = useState(false), showEditor = _ko[0], setShowEditor = _ko[1];
  var _edit = useState([]), editDiff = _edit[0], setEditDiff = _edit[1];
  var _l = useState([]), progressSteps = _l[0], setProgressSteps = _l[1];
  var _m = useState({}), diffData = _m[0], setDiffData = _m[1];
  var _n = useState(false), showDiff = _n[0], setShowDiff = _n[1];
  var _o = useState(false), isModifying = _o[0], setIsModifying = _o[1];
  var chatEnd = useRef(null);
  var inputRef = useRef(null);
  var exportRef = useRef(null);

  useEffect(function() {

      chatEnd.current.scrollIntoView({behavior:'smooth'});
    }
  }, [msgs, planData, progressSteps]);

    AXIOS.get('/llm/status').then(function(r) { setLlmMode(r.data.mode||'none'); }).catch(function() {});
  }, []);

  useEffect(function() {

    };
    document.addEventListener('mousedown', handleClickOutside);
    return function() { document.removeEventListener('mousedown', handleClickOutside); };
  }, []);

  var SECTION_MODULES = [
    {module:'overview',    pattern:'## 一'},
    {module:'irrigation',  pattern:'## 二'},
    {module:'equipment',   pattern:'## 三'},
    {module:'references',  pattern:'## 四'},
    {module:'explanation', pattern:'## 五'},
  ];

  var parsePlanSections = function(plan) {
    var sections = [];
    var positions = [];
    for (var i = 0; i < SECTION_MODULES.length; i++) {
      var idx = plan.indexOf(SECTION_MODULES[i].pattern);
      if (idx >= 0) {
